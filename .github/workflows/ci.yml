name: ClearDocs CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: cleardocs_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:7-jammy
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven (skip tests)
        run: mvn -B -q clean compile

      - name: Run unit tests
        run: mvn -B test -Dtest="*Test" -DfailIfNoTests=false

      - name: Run integration tests
        env:
          POSTGRES_URL: jdbc:postgresql://localhost:5432/cleardocs_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          MONGO_URI: mongodb://localhost:27017/cleardocs_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: VGVzdFNlY3JldEtleUZvckNsZWFyRG9jc0p3dFRva2Vucw==
          JWT_EXPIRATION: 86400000
          JWT_REFRESH_EXPIRATION: 604800000
        run: mvn -B verify -Dtest="*IntegrationTest" -DfailIfNoTests=false

      - name: Generate JaCoCo coverage report
        run: mvn -B jacoco:report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: cleardocs/api:${{ github.sha }},cleardocs/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
